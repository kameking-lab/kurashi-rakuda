# 制度データ検証 CI
#
# 設計方針:
#   - 構造検査（オフライン）は PR ブロッキング。出典なしの数値・期限切れデータを混入させない。
#   - 出典照合（ネットワーク）は PR をブロックしない。相手サイトの都合や一時的な障害で
#     落ちうるため、日次スケジュールで回して Issue を自動起票する。
#     制度改正の検知チャネルとして機能する（[08_タスク分解] P3-04 制度改定 自動追随サイクル）。

name: verify-seido

on:
  pull_request:
    paths:
      - 'data/**'
      - 'content/**'
      - 'factory/**'
      - 'scripts/verify-seido.mjs'
      - 'scripts/check-freshness.mjs'
      - '.github/workflows/verify-seido.yml'
  push:
    branches: [master]
    paths:
      - 'data/**'
      - 'content/**'
      - 'factory/**'
      - 'scripts/verify-seido.mjs'
      - 'scripts/check-freshness.mjs'
  schedule:
    # 毎日 JST 07:00（UTC 22:00）に出典照合を実行し、制度改正・ページ改稿を検知する。
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      fetch:
        description: '出典照合（ネットワーク）も実行する'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  # ---------------------------------------------------------------- 構造検査
  structure:
    name: 構造検査（出典・確認日・改正メモ・期限）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 制度データの構造検査
        id: structure
        # 出典なしの数値、確認日の欠落、改正メモの欠落、まとめサイトの混入、
        # expiresOn を過ぎた期限切れデータを検出する。ネットワーク不要。
        run: node scripts/verify-seido.mjs 2>&1 | tee structure-report.txt && exit ${PIPESTATUS[0]}
        shell: bash
        continue-on-error: true

      - name: 期限切れ等の検出時に Issue を起票（スケジュール実行時）
        # expiresOn 到来（例: 2026-08-01 の育休給付上限額改定）を日次で検知して起票する。
        # 対応手順は BACKLOG.md の「D: 日付トリガージョブ」を参照。
        if: steps.structure.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '制度データの構造検査が失敗しました。期限切れ（expiresOn 到来）または構造違反です。\n\n';
            try {
              body += '```\n' + fs.readFileSync('structure-report.txt', 'utf8').slice(0, 55000) + '\n```\n';
            } catch (e) {
              body += '(レポートの読み込みに失敗しました)\n';
            }
            body += '\n対応手順: BACKLOG.md の「D: 日付トリガージョブ」を参照。YMYLのため実装者≠検算者のダブルチェック必須。\n';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'seido-expiry',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[制度データ] 構造検査の失敗・期限切れ検知 (${new Date().toISOString().slice(0, 10)})`,
                body, labels: ['seido-expiry', 'YMYL'],
              });
            }

      - name: 構造検査の結果を反映
        if: steps.structure.outcome == 'failure'
        run: |
          echo '構造検査に失敗しました。上のログを確認してください。'
          exit 1

  # ------------------------------------------------------------ データ鮮度監査
  freshness:
    name: データ鮮度監査（nextCheckDue / next_check_due。P2-I01）
    # data/seido の nextCheckDue は structure ジョブ（verify-seido.mjs）が検査する。
    # 本ジョブはその監視外だった data/tables と記事 front-matter を担当する。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 鮮度監査（data/tables + 記事 front-matter）
        id: freshness
        run: node scripts/check-freshness.mjs 2>&1 | tee freshness-report.txt && exit ${PIPESTATUS[0]}
        shell: bash
        continue-on-error: true

      - name: 期限超過の検出時に Issue を起票（スケジュール実行時・1日1Issue集約）
        # 再確認期限（nextCheckDue / next_check_due）の超過を日次で検知して起票する。
        # ★1項目1Issueにはしない★ 同日の検出は1本のレポートに集約し、既に open の
        # freshness-audit Issue があればコメントで追記する（Issue の乱立＝誤爆をさせない）。
        if: steps.freshness.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'データ鮮度監査（P2-I01）で再確認期限の超過を検出しました。\n\n';
            try {
              body += '```\n' + fs.readFileSync('freshness-report.txt', 'utf8').slice(0, 55000) + '\n```\n';
            } catch (e) {
              body += '(レポートの読み込みに失敗しました)\n';
            }
            body += '\n---\n## 対応手順（docs/10_公開チェックリスト.md「データ鮮度監査 Issue の消化手順」参照）\n';
            body += '1. 該当ファイルの出典URLを開き、値が現行と一致しているかを一次情報で再確認する\n';
            body += '2. **値が変わっていない場合**: 確認日（checkedAt / lastVerified / last_verified）を更新し、nextCheckDue / next_check_due を次の周期に進める\n';
            body += '3. **値が変わっていた場合**: 値・出典・amendments を更新し、依存するツール・記事も追随させる\n';
            body += '4. data/seido の期限超過は verify-seido の構造検査（seido-expiry Issue）側で検知される\n\n';
            body += '⚠️ YMYL領域のため、実装者≠検算者のダブルチェックを行うこと。\n';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'freshness-audit',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[データ鮮度] 再確認期限の超過 (${new Date().toISOString().slice(0, 10)})`,
                body, labels: ['freshness-audit', 'YMYL'],
              });
            }

      - name: 鮮度監査の結果を反映
        if: steps.freshness.outcome == 'failure'
        run: |
          echo 'データ鮮度監査に失敗しました。上のログを確認してください。'
          exit 1

  # ------------------------------------------------------------ 記事忠実性ゲート
  fidelity:
    name: 記事忠実性ゲート（本文 ⇔ facts ⇔ data/ の三者照合）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 忠実性ゲート
        # 記事本文のYMYL数値が frontmatter.facts[] と data/（root、単一ソース）に
        # 機械照合で一致しない限りマージさせない。
        run: node factory/scripts/check-fidelity.mjs content/articles

  # ---------------------------------------------------------------- 出典照合
  sources:
    name: 出典照合（一次情報との機械照合）
    # PR ではネットワーク照合をブロッキングにしない（相手サイト都合で落ちるため）
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: PyMuPDF の導入
        # 官公庁の日本語PDFは pdftotext だと重なり合うテキストランが混ざって読めない。
        # PyMuPDF が無いと照合が誤って失敗するため必須。
        run: pip install pymupdf

      - name: 出典照合
        id: verify
        continue-on-error: true
        run: |
          node scripts/verify-seido.mjs --fetch --json > seido-report.json 2>&1 || true
          node scripts/verify-seido.mjs --fetch | tee seido-report.txt
        # exit code は次のステップで判定する

      - name: レポートを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seido-verify-report
          path: |
            seido-report.json
            seido-report.txt
          retention-days: 30

      - name: 照合失敗時に Issue を起票
        # 出典ページから期待する数値が消えた ＝ 制度が改正されたか、ページが改稿された。
        # どちらも人間の確認が必要なので Issue にする。
        if: steps.verify.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '出典照合に失敗しました。制度が改正されたか、出典ページの表記が変わった可能性があります。\n\n';
            try {
              body += '```\n' + fs.readFileSync('seido-report.txt', 'utf8').slice(0, 55000) + '\n```\n';
            } catch (e) {
              body += '(レポートの読み込みに失敗しました)\n';
            }
            body += '\n---\n';
            body += '## 対応手順\n';
            body += '1. 該当の出典URLを開き、数値が実際に変わったのかを確認する\n';
            body += '2. **改正されていた場合**: `data/seido/` の該当値・`checkedAt`・`amendments` を更新する\n';
            body += '3. **ページの表記が変わっただけの場合**: `verify.expect` を新しい表記に合わせる\n';
            body += '4. **出典ページが移転・削除された場合**: `landingUrl` から新URLを辿って差し替える\n\n';
            body += '⚠️ YMYL領域のため、実装者≠検算者のダブルチェックを行うこと（[08_タスク分解] 作業者振り分けの指針）。\n';

            const title = `[制度データ] 出典照合の失敗 (${new Date().toISOString().slice(0, 10)})`;

            // 同種の Issue が既に開いていれば重複起票しない
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seido-verify',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['seido-verify', 'YMYL'],
              });
            }

      - name: 照合結果を反映して job を失敗させる
        if: steps.verify.outcome == 'failure'
        run: |
          echo '出典照合に失敗しました。上のログを確認してください。'
          exit 1
